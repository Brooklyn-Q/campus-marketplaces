services:
  - type: web
    name: campus-marketplace-api
    env: php
    region: frankfurt
    plan: free
    buildCommand: "composer install --no-dev --optimize-autoloader"
    startCommand: "apache2-foreground"
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
