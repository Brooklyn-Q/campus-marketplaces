<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Campus Marketplace — Buy, sell, and trade safely with fellow students. Your campus, your marketplace." />
    <title>Campus Marketplace</title>
    <!-- Legacy design system CSS -->
    <link rel="stylesheet" href="/public/assets/css/style.css?v=2.1">
    <!-- Prevent FOUC: apply theme before React loads -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <script type="module" crossorigin src="/public/app.js"></script>
    <link rel="modulepreload" crossorigin href="/public/rolldown-runtime.js">
    <link rel="modulepreload" crossorigin href="/public/icons.js">
    <link rel="modulepreload" crossorigin href="/public/router.js">
    <link rel="modulepreload" crossorigin href="/public/motion.js">
    <link rel="modulepreload" crossorigin href="/public/react-vendor.js">
    <link rel="stylesheet" crossorigin href="/public/app.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- Load React App -->
    <!-- Legacy JS for side cart compatibility -->
    <script src="/public/assets/js/main.js"></script>

    <!-- SIDE CART DRAWER -->
    <div class="cart-drawer-backdrop" id="sideCartBackdrop" onclick="closeSideCart()"></div>
    <div class="cart-drawer" id="sideCartDrawer">
        <div class="cart-drawer-header">
            <h2>Your Cart</h2>
            <button class="cart-drawer-close" onclick="closeSideCart()">&times;</button>
        </div>
        <div class="cart-drawer-body" id="sideCartItems"></div>
        <div class="cart-drawer-footer" id="sideCartFooter" style="display:none;">
            <div class="cart-drawer-total">
                <span>Total</span>
                <span id="sideCartTotal">₵0.00</span>
            </div>
            <!-- Wait, where to redirect for checkout? We can just keep it as /checkout for now, or just an alert if not implemented -->
            <a href="/checkout" onclick="if(window.location.pathname.startsWith('/checkout')) { closeSideCart(); } else { window.location.href='/checkout'; return false; }" class="btn-nike-checkout" style="display:block; text-align:center;">Checkout to Contact Seller</a>
        </div>
    </div>
    
    <script>
        function openSideCart() {
            document.getElementById('sideCartBackdrop').classList.add('open');
            document.getElementById('sideCartDrawer').classList.add('open');
            document.body.style.overflow = 'hidden';
            if (window.renderSideCart) window.renderSideCart();
        }
        function closeSideCart() {
            document.getElementById('sideCartBackdrop').classList.remove('open');
            document.getElementById('sideCartDrawer').classList.remove('open');
            document.body.style.overflow = 'auto';
        }
        window.openSideCart = openSideCart;

        window.renderSideCart = function() {
            if(typeof cmCart === 'undefined') return;
            const cart = cmCart.get();
            const itemsContainer = document.getElementById('sideCartItems');
            const footer = document.getElementById('sideCartFooter');
            
            if (cart.length === 0) {
                itemsContainer.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding:2rem 0;">Your cart is empty.</p>';
                footer.style.display = 'none';
                return;
            }
            
            footer.style.display = 'block';
            itemsContainer.innerHTML = cart.map(item => `
                <div class="cart-drawer-item">
                    <img src="${item.image || ''}" onerror="this.src=''; this.style.background='var(--border)';">
                    <div class="cart-drawer-details">
                        <div class="cart-drawer-title">${item.name}</div>
                        <div class="cart-drawer-price">₵${item.price.toFixed(2)}</div>
                        <div class="cart-drawer-actions">
                            <div class="cart-drawer-qty">
                                <button onclick="cmCart.updateQty(${item.id}, ${item.qty - 1}); window.renderSideCart();">&minus;</button>
                                <span style="font-weight:600; width:20px; text-align:center;">${item.qty}</span>
                                <button onclick="cmCart.updateQty(${item.id}, ${item.qty + 1}); window.renderSideCart();">&plus;</button>
                            </div>
                            <button class="cart-drawer-remove" onclick="cmCart.remove(${item.id}); window.renderSideCart();">Remove</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            const total = cmCart.total();
            document.getElementById('sideCartTotal').textContent = '₵' + total.toFixed(2);
        };
    </script>
  </body>
</html>
