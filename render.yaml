services:
  - type: web
    name: campus-marketplace
    env: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DB_TYPE
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: '5432'
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      - key: DB_PASS
        sync: false
      - key: SUPABASE_PROJECT_REF
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: uploads
      - key: JWT_SECRET
        generateValue: true
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://your-app-name.netlify.app
      - key: APP_ENV
        value: production
